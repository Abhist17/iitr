<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <defs>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1535;stop-opacity:1" />
    </linearGradient>
    <clipPath id="eyeClip">
      <ellipse cx="100" cy="70" rx="60" ry="36" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="140" fill="url(#bgGrad)" rx="8" />

  <!-- Corner brackets -->
  <!-- Top-left -->
  <path d="M10,28 L10,10 L28,10" stroke="url(#eyeGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right -->
  <path d="M172,10 L190,10 L190,28" stroke="url(#eyeGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left -->
  <path d="M10,112 L10,130 L28,130" stroke="url(#eyeGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <path d="M172,130 L190,130 L190,112" stroke="url(#eyeGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eye outline -->
  <ellipse cx="100" cy="70" rx="60" ry="36" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5"/>

  <!-- Iris/fingerprint concentric arcs clipped inside eye -->
  <g clip-path="url(#eyeClip)" fill="none" stroke="url(#eyeGrad)" stroke-width="1.2" opacity="0.85">
    <!-- Concentric fingerprint-like ellipses -->
    <ellipse cx="100" cy="70" rx="10" ry="8" />
    <ellipse cx="100" cy="70" rx="16" ry="13" />
    <ellipse cx="100" cy="70" rx="22" ry="18" />
    <ellipse cx="100" cy="70" rx="28" ry="23" />
    <ellipse cx="100" cy="70" rx="34" ry="27" />
    <ellipse cx="100" cy="70" rx="40" ry="31" />
    <ellipse cx="100" cy="70" rx="46" ry="34" />
    <ellipse cx="100" cy="70" rx="52" ry="35.5" />
    <!-- Horizontal center line through fingerprint -->
    <line x1="40" y1="70" x2="160" y2="70" stroke-width="0.8" opacity="0.4"/>
    <!-- Slight wave lines to give fingerprint feel -->
    <path d="M62,56 Q80,52 100,54 Q120,56 138,52" />
    <path d="M58,62 Q78,57 100,59 Q122,61 142,57" />
    <path d="M56,68 Q78,63 100,65 Q122,67 144,63" opacity="0.6"/>
    <path d="M58,76 Q78,80 100,78 Q122,76 142,80" />
    <path d="M62,82 Q80,87 100,85 Q120,83 138,87" />
  </g>

  <!-- Pupil dot -->
  <circle cx="100" cy="70" r="4" fill="url(#eyeGrad)" />

  <!-- Eye corner highlights -->
  <path d="M40,70 Q55,48 100,48 Q145,48 160,70" fill="none" stroke="url(#eyeGrad)" stroke-width="2" opacity="0.5"/>
  <path d="M40,70 Q55,92 100,92 Q145,92 160,70" fill="none" stroke="url(#eyeGrad)" stroke-width="2" opacity="0.5"/>
</svg>
